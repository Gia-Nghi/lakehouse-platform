source_name: osm

provider: openstreetmap

storage:
  bucket: lakehouse
  bronze_prefix: bronze/geo_context/osm/

execution:
  schedule: "@weekly"
  checkpoint_enabled: true

request:
  timeout_seconds: 180
  retry_attempts: 3
  retry_delay_seconds: 5

regions:
  - name: ho_chi_minh_city
    country: vietnam
    admin_level: city

layers:

  # =========================================================
  # POIs
  # =========================================================
  - name: pois

    geometry_types:
      - node
      - way

    tags:

      amenity:
        - school
        - university
        - college
        - kindergarten

        - hospital
        - clinic
        - pharmacy

        - cafe
        - restaurant
        - fast_food

        - bank
        - atm

        - police
        - fire_station
        - post_office

        - marketplace
        - bus_station

      shop:
        - supermarket
        - convenience
        - mall

      leisure:
        - park
        - fitness_centre
        - sports_centre

    output:
      format: jsonl

      partition_by:
        - region
        - layer
        - year
        - month

  # =========================================================
  # ROADS
  # =========================================================
  - name: roads

    geometry_types:
      - way

    tags:

      highway:
        - motorway
        - trunk
        - primary
        - secondary
        - tertiary
        - residential
        - service
        - living_street

    output:
      format: jsonl

      partition_by:
        - region
        - layer
        - year
        - month

  # =========================================================
  # TRANSIT STOPS
  # =========================================================
  - name: transit_stops

    geometry_types:
      - node
      - way

    tags:

      public_transport:
        - stop_position
        - platform
        - station

      highway:
        - bus_stop

      railway:
        - station
        - halt

    output:
      format: jsonl

      partition_by:
        - region
        - layer
        - year
        - month

  # =========================================================
  # RAILWAYS
  # =========================================================
  - name: railways

    geometry_types:
      - way

    tags:

      railway:
        - rail
        - subway
        - tram
        - light_rail
        - construction

    output:
      format: jsonl

      partition_by:
        - region
        - layer
        - year
        - month

  # =========================================================
  # ADMINISTRATIVE BOUNDARIES
  # =========================================================
  - name: administrative_boundaries

    geometry_types:
      - relation
      - way

    tags:

      boundary:
        - administrative

      admin_level:
        - "8"
        - "10"

    output:
      format: jsonl

      partition_by:
        - region
        - layer
        - year
        - month