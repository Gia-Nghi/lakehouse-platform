spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

spark.sql.catalog.lakehouse org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.catalog-impl org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.lakehouse.uri http://nessie:19120/api/v2
spark.sql.catalog.lakehouse.ref main
spark.sql.catalog.lakehouse.warehouse s3a://lakehouse/

spark.hadoop.fs.s3a.endpoint http://minio:9000
spark.hadoop.fs.s3a.access.key admin
spark.hadoop.fs.s3a.secret.key password123
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.impl org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.endpoint.region us-east-1

spark.pyspark.python python3.11
spark.pyspark.driver.python python3.11
spark.driverEnv.PYSPARK_PYTHON python3.11
spark.executorEnv.PYSPARK_PYTHON python3.11
spark.driverEnv.PYTHONPATH /opt/airflow
spark.executorEnv.PYTHONPATH /opt/airflow

spark.sql.shuffle.partitions 8

spark.jars /opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.5.2.jar,/opt/spark/jars/nessie-spark-extensions-3.5_2.12-0.108.0.jar,/opt/spark/jars/hadoop-aws-3.3.4.jar,/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
