spark.sql.catalog.nessie org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri http://lakehouse-nessie:19120/api/v2
spark.sql.catalog.nessie.warehouse s3a://warehouse/
spark.sql.catalog.nessie.io-impl org.apache.iceberg.aws.s3.S3FileIO

# Cấu hình S3 cho Iceberg (AWS SDK V2)
spark.sql.catalog.nessie.s3.endpoint http://lakehouse-minio:9000
spark.sql.catalog.nessie.s3.path-style-access true
spark.sql.catalog.nessie.s3.region us-east-1
spark.sql.catalog.nessie.s3.http-client.type urlconnection

# Cấu hình xác thực S3 cho Iceberg (AWS SDK V2)
spark.sql.catalog.nessie.s3.access-key-id admin
spark.sql.catalog.nessie.s3.secret-access-key password123

# Cấu hình S3 cho Hadoop (Dành cho các thư viện cũ hơn)
spark.hadoop.fs.s3a.endpoint http://lakehouse-minio:9000
spark.hadoop.fs.s3a.access.key admin
spark.hadoop.fs.s3a.secret.key password123
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.impl org.apache.hadoop.fs.s3a.S3AFileSystem
